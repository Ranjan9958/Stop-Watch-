 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stopwatch Web Application</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e0342, #2a5bcf);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .stopwatch {
      font-size: 3rem;
      margin: 20px 0;
    }

    .buttons button {
      font-size: 1rem;
      padding: 10px 20px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background-color: #fff;
      color: #1e0342;
      transition: 0.3s;
    }

    .buttons button:hover {
      background-color: #cce3ff;
    }

    .laps {
      margin-top: 20px;
      max-height: 200px;
      overflow-y: auto;
      width: 100%;
      max-width: 300px;
      background: rgba(255,255,255,0.1);
      padding: 10px;
      border-radius: 10px;
    }

    .laps div {
      margin: 5px 0;
      font-size: 1rem;
      color: #fff;
      border-bottom: 1px solid rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <h1>Stopwatch App</h1>
  <div class="stopwatch" id="display">00:00:00</div>
  <div class="buttons">
    <button onclick="startStopwatch()">Start</button>
    <button onclick="pauseStopwatch()">Pause</button>
    <button onclick="resetStopwatch()">Reset</button>
    <button onclick="recordLap()">Lap</button>
  </div>
  <div class="laps" id="laps"></div>

  <script>
    let timer;
    let startTime;
    let elapsedTime = 0;
    let running = false;

    function updateDisplay() {
      const time = Date.now() - startTime + elapsedTime;
      const hours = Math.floor(time / (1000 * 60 * 60)).toString().padStart(2, '0');
      const minutes = Math.floor((time / (1000 * 60)) % 60).toString().padStart(2, '0');
      const seconds = Math.floor((time / 1000) % 60).toString().padStart(2, '0');
      document.getElementById('display').textContent = `${hours}:${minutes}:${seconds}`;
    }

    function startStopwatch() {
      if (!running) {
        startTime = Date.now();
        timer = setInterval(updateDisplay, 1000);
        running = true;
      }
    }

    function pauseStopwatch() {
      if (running) {
        clearInterval(timer);
        elapsedTime += Date.now() - startTime;
        running = false;
      }
    }

    function resetStopwatch() {
      clearInterval(timer);
      elapsedTime = 0;
      running = false;
      document.getElementById('display').textContent = "00:00:00";
      document.getElementById('laps').innerHTML = "";
    }

    function recordLap() {
      if (running) {
        const lapTime = document.getElementById('display').textContent;
        const lap = document.createElement('div');
        lap.textContent = `Lap - ${lapTime}`;
        document.getElementById('laps').prepend(lap);
      }
    }
  </script>
</body>
</html>
